<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Agriculture AI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(to right,#e8f5e9,#f4f6f9);
}
.container{
  max-width:1300px;
  margin:auto;
  padding:20px;
}
header{text-align:center;margin-bottom:20px;}
.controls{text-align:center;margin-bottom:20px;}
button{
  padding:8px 14px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2e7d32;
  color:white;
  cursor:pointer;
}
button:hover{background:#1b5e20;}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  text-align:center;
}
.charts,.ml-box,.map-box{
  margin-top:25px;
  background:white;
  padding:20px;
  border-radius:12px;
}
.blink{
  animation:blink 1s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
@media(max-width:768px){
  h1{font-size:20px;}
}
</style>
</head>
<body>

<div class="container">

<header>
<h1>🌱 Smart Agriculture Monitoring System</h1>
<div id="dateTime"></div>
</header>

<div class="controls">
<h3>🌾 Crop</h3>
<button onclick="setCrop('Rice')">Rice</button>
<button onclick="setCrop('Wheat')">Wheat</button>
<button onclick="setCrop('Tomato')">Tomato</button>

<h3>🌦 Season</h3>
<button onclick="setSeason('Summer')">Summer</button>
<button onclick="setSeason('Monsoon')">Monsoon</button>
<button onclick="setSeason('Winter')">Winter</button>
</div>

<div class="cards">
<div class="card"><h3>Crop</h3><p id="crop">Rice</p></div>
<div class="card"><h3>Season</h3><p id="season">Summer</p></div>
<div class="card"><h3>Time</h3><p id="dayNight"></p></div>
<div class="card"><h3>Moisture</h3><p id="moisture"></p></div>
<div class="card"><h3>Next Moisture</h3><p id="predictedMoisture"></p></div>
<div class="card"><h3>Temperature</h3><p id="temperature"></p></div>
<div class="card"><h3>Humidity</h3><p id="humidity"></p></div>
<div class="card"><h3>Rain Probability</h3><p id="rainProbability"></p></div>
<div class="card"><h3>Motor Status</h3><p id="motorStatus">OFF</p></div>
<div class="card"><h3>AI Confidence</h3><p id="aiConfidence"></p></div>
</div>

<div class="charts">
<canvas id="moistureChart"></canvas>
<canvas id="weeklyYieldChart" style="margin-top:30px;"></canvas>
</div>

<div class="ml-box">
<h2>🤖 AI Prediction</h2>
<p id="plantHealth"></p>
<p id="yieldPrediction"></p>
<p id="alertMessage"></p>
</div>

<div class="ml-box">
<h2>📩 Farmer SMS</h2>
<p id="smsBox"></p>
</div>

<div class="map-box">
<h2>📍 Farm Location</h2>
<iframe
src="https://www.google.com/maps?q=Chennai&output=embed"
width="100%" height="250" style="border-radius:10px;"></iframe>
</div>

</div>

<script>

// ===== VARIABLES =====
let moisture=50,temp=30,humidity=60;
let crop="Rice",season="Summer";
let moistureHistory=[];
const alertSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// ===== DATE =====
setInterval(()=>{document.getElementById("dateTime").innerText=
new Date().toLocaleString();},1000);

// ===== SETTERS =====
function setCrop(c){crop=c;document.getElementById("crop").innerText=c;}
function setSeason(s){season=s;document.getElementById("season").innerText=s;}

// ===== CHARTS =====
const moistureChart=new Chart(document.getElementById("moistureChart"),{
type:"line",
data:{labels:[],datasets:[{label:"Soil Moisture %",data:[],borderColor:"#2e7d32",tension:0.3}]}
});

const weeklyChart=new Chart(document.getElementById("weeklyYieldChart"),{
type:"line",
data:{labels:["Day1","Day2","Day3","Day4","Day5","Day6","Day7"],
datasets:[{label:"Weekly Yield Forecast %",data:[],borderColor:"#1565c0",tension:0.3}]}
});

// ===== FUNCTIONS =====
function applyEnvironment(){
let hour=new Date().getHours();
let time=(hour>=6&&hour<=18)?"Day":"Night";
if(time==="Day")moisture-=1.5;else moisture+=0.5;
if(season==="Summer")moisture-=2;
if(season==="Monsoon")moisture+=3;
if(season==="Winter")moisture-=0.5;
return time;
}

function predictNext(){
if(moistureHistory.length<2)return moisture;
let slope=moistureHistory[moistureHistory.length-1]-
moistureHistory[moistureHistory.length-2];
return Math.round(moisture+slope);
}

function regressionYield(){
return Math.round(
0.5*moisture+
0.3*(35-Math.abs(28-temp))+
0.2*humidity
);
}

function rainProbability(){
let prob=(0.6*humidity)+(0.3*(100-temp))+(0.1*moisture);
return Math.min(100,Math.max(0,Math.round(prob/2)));
}

function confidence(){
if(moistureHistory.length<3)return 70;
let variance=Math.abs(
moistureHistory[moistureHistory.length-1]-
moistureHistory[0]);
return Math.max(60,100-(variance*5));
}

function weeklyForecast(){
let base=regressionYield();
let arr=[];
for(let i=0;i<7;i++){
arr.push(Math.round(base+(Math.random()*6-3)));
}
weeklyChart.data.datasets[0].data=arr;
weeklyChart.update();
}

// ===== MAIN LOOP =====
function update(){

let time=applyEnvironment();

moisture+=Math.random()*4-2;
temp+=Math.random()*2-1;
humidity+=Math.random()*4-2;

moisture=Math.round(moisture);
temp=Math.round(temp);
humidity=Math.round(humidity);

moistureHistory.push(moisture);
if(moistureHistory.length>5)moistureHistory.shift();

let predicted=predictNext();
let yieldVal=regressionYield();
let rainChance=rainProbability();

document.getElementById("dayNight").innerText=time;
document.getElementById("moisture").innerText=moisture+"%";
document.getElementById("predictedMoisture").innerText=predicted+"%";
document.getElementById("temperature").innerText=temp+"°C";
document.getElementById("humidity").innerText=humidity+"%";
document.getElementById("rainProbability").innerText=rainChance+"%";
document.getElementById("yieldPrediction").innerText="Predicted Yield: "+yieldVal+"%";
document.getElementById("aiConfidence").innerText=Math.round(confidence())+"%";

// Health Score
let score=0;
if(moisture>=45&&moisture<=70)score+=3;else score-=2;
if(temp>=20&&temp<=35)score+=2;else score-=1;
if(crop==="Rice"&&moisture<60)score-=2;
if(crop==="Wheat"&&moisture>70)score-=2;
if(crop==="Tomato"&&temp>35)score-=2;

document.getElementById("plantHealth").innerText=
(score>=4)?"Plant Health: Excellent 🌿":
(score>=1)?"Plant Health: Moderate ⚠":
"Plant Health: Critical 🚨";

// ALERT + MOTOR
let alertText="",color="green",motor="OFF",blink=false;

if(moisture<35){
alertText="🚨 Critical Moisture! Motor Activated.";
color="red";motor="ON";blink=true;
}
else if(rainChance>70){
alertText="⚠ High Rain Probability. Stop Irrigation.";
color="blue";
}
else{
alertText="✅ Conditions Stable.";
}

let alertBox=document.getElementById("alertMessage");
alertBox.innerText=alertText;
alertBox.style.color=color;
blink?alertBox.classList.add("blink"):
alertBox.classList.remove("blink");

document.getElementById("motorStatus").innerText=motor;

// SMS Simulation
document.getElementById("smsBox").innerText=
(motor==="ON")?
"SMS Sent: Irrigation motor turned ON due to low moisture.":
(rainChance>70)?
"SMS Sent: Rain expected. Irrigation stopped.":
"SMS Sent: Field conditions normal.";

// Charts
let timeLabel=new Date().toLocaleTimeString();
moistureChart.data.labels.push(timeLabel);
moistureChart.data.datasets[0].data.push(moisture);
if(moistureChart.data.labels.length>10){
moistureChart.data.labels.shift();
moistureChart.data.datasets[0].data.shift();
}
moistureChart.update();

weeklyForecast();
}

setInterval(update,5000);
update();

</script>
</body>
</html>
